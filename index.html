<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automotive Photography | Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0a0a0a; color: #ffffff; }
        .hero-gradient { background: linear-gradient(to bottom, rgba(0,0,0,0.3), #0a0a0a); }
    </style>
</head>
<body>

    <nav class="p-6 flex justify-between items-center sticky top-0 bg-black/80 backdrop-blur-md z-50">
        <div class="text-2xl font-bold tracking-tighter">AUTO<span class="text-gray-500">FOCUS</span></div>
        <div class="space-x-8 text-sm uppercase tracking-widest">
            <a href="#gallery" class="hover:text-gray-400 transition">Galerie</a>
            <a href="#contact" class="hover:text-gray-400 transition">Kontakt</a>
        </div>
    </nav>

    <section class="h-[80vh] flex items-center justify-center relative overflow-hidden">
        <div class="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1503376780353-7e6692767b70?auto=format&fit=crop&q=80&w=2070')] bg-cover bg-center opacity-60"></div>
        <div class="absolute inset-0 hero-gradient"></div>
        <div class="relative z-10 text-center">
            <h1 class="text-6xl md:text-8xl font-bold mb-4 tracking-tighter">PERFEKTION IM DETAIL.</h1>
            <p class="text-xl text-gray-400 uppercase tracking-[0.3em]">Exklusive Automobil-Fotografie</p>
        </div>
    </section>

    <section id="gallery" class="py-20 px-6 max-w-7xl mx-auto">
        <h2 class="text-3xl font-light mb-12 text-center uppercase tracking-widest">Portfolio</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
            <div class="aspect-video bg-gray-900 overflow-hidden group">
                <img src="https://images.unsplash.com/photo-1492144534655-ae79c964c9d7?auto=format&fit=crop&q=80&w=1000" class="w-full h-full object-cover grayscale hover:grayscale-0 transition duration-700">
            </div>
            <div class="aspect-video bg-gray-900 overflow-hidden group">
                <img src="https://images.unsplash.com/photo-1583121274602-3e2820c69888?auto=format&fit=crop&q=80&w=1000" class="w-full h-full object-cover grayscale hover:grayscale-0 transition duration-700">
            </div>
            <div class="aspect-video bg-gray-900 overflow-hidden group">
                <img src="https://images.unsplash.com/photo-1552519507-da3b142c6e3d?auto=format&fit=crop&q=80&w=1000" class="w-full h-full object-cover grayscale hover:grayscale-0 transition duration-700">
            </div>
            <div class="aspect-video bg-gray-900 overflow-hidden group">
                <img src="https://images.unsplash.com/photo-1542362567-b054cd1391a1?auto=format&fit=crop&q=80&w=1000" class="w-full h-full object-cover grayscale hover:grayscale-0 transition duration-700">
            </div>
            <div class="aspect-video bg-gray-900 overflow-hidden group">
                <img src="https://images.unsplash.com/photo-1494976388531-d1058494cdd8?auto=format&fit=crop&q=80&w=1000" class="w-full h-full object-cover grayscale hover:grayscale-0 transition duration-700">
            </div>
            <div class="aspect-video bg-gray-900 overflow-hidden group">
                <img src="https://images.unsplash.com/photo-1525609004556-c46c7d6cf0a3?auto=format&fit=crop&q=80&w=1000" class="w-full h-full object-cover grayscale hover:grayscale-0 transition duration-700">
            </div>
        </div>
    </section>

    <section id="contact" class="py-20 px-6 bg-[#0f0f0f]">
        <div class="max-w-3xl mx-auto text-center">
            <h2 class="text-3xl font-light mb-8 uppercase tracking-widest">Projekt anfragen</h2>
            <form class="space-y-4">
                <input type="text" placeholder="Name" class="w-full p-4 bg-black border border-gray-800 focus:border-white outline-none transition">
                <input type="email" placeholder="E-Mail" class="w-full p-4 bg-black border border-gray-800 focus:border-white outline-none transition">
                <textarea placeholder="Deine Nachricht" rows="5" class="w-full p-4 bg-black border border-gray-800 focus:border-white outline-none transition"></textarea>
                <button class="w-full py-4 bg-white text-black font-bold uppercase tracking-widest hover:bg-gray-200 transition">Absenden</button>
            </form>
        </div>
    </section>

    <footer class="py-10 text-center text-gray-600 text-sm">
        &copy; 2026 Autofocus Photography. Alle Rechte vorbehalten.
    </footer>

</body>
</html>
